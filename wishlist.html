<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Wishlist • RateFlix Movies</title>

<link
rel="icon"
type="image/jpg"
href="images/rateflixfevicon.jpg"
/>

<link rel="stylesheet" href="style.css"/>

</head>

<body>

<nav class="navbar">

<div class="nav-container">

<a href="index.html" class="brand-logo">

<img
src="images/rateflixfevicon.jpg"
alt="RateFlix"
/>

<span>

RateFlix Movies

</span>

</a>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="wishlist.html" class="active">Wishlist ❤️</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>

</div>

</div>

</nav>



<section class="page">

<div class="wishlist-header">

<div class="hero-badge">

Your Saved Collection

</div>

<h2>

Your Wishlist ❤️

</h2>

<p>

Movies you’ve saved to revisit later.

</p>

</div>

<div
id="wishlistGrid"
class="movie-grid"
></div>

</section>



<footer class="footer">

<div class="footer-brand">

<img
src="images/rateflixfevicon.jpg"
alt="RateFlix"
/>

<h3>

RateFlix Movies

</h3>

</div>

<p>

Discover • Rate • Review • Rewatch

</p>

<p>

let’s have some charcha.

</p>

<p class="copyright">

© 2026 RateFlix Movies. All rights reserved.

</p>

</footer>



<script>


const movies =
JSON.parse(
localStorage.getItem("movies")
) || [];

let wishlist =
JSON.parse(
localStorage.getItem("wishlist")
) || [];

function removeFromWishlist(id){

wishlist = wishlist.filter(
movieId => movieId !== id
);

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

renderWishlist();
}

function renderWishlist(){

const wishlistMovies =
movies.filter(movie =>
wishlist.includes(movie.id)
);

document
.getElementById("wishlistGrid")
.innerHTML =

wishlistMovies.length

? wishlistMovies.map(
movie => `

<div
class="movie-card"
style="position:relative;"
>

<button
onclick="removeFromWishlist(${movie.id})"
style="
position:absolute;
top:12px;
right:12px;
width:38px;
height:38px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.75);
color:white;
font-size:20px;
cursor:pointer;
z-index:50;
"
>
✕
</button>

<img
src="${movie.poster}"
alt="${movie.title}"
>

<div class="movie-info">

<h3>${movie.title}</h3>

<p>
${movie.language} • ${movie.genre}
</p>

<p>
IMDb ⭐ ${movie.imdb}
</p>

</div>

</div>

`
).join("")

: `<p>No movies added yet.</p>`;
}

renderWishlist();

</script>



</body>
</html>
